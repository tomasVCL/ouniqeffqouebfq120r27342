<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 64" fill="none" role="img" aria-label="Isar Textile Company">
  <!-- Emblem: woven-fabric mark -->
  <rect x="2" y="8" width="48" height="48" rx="13" fill="#0F6E5C"/>
  <!-- vertical warp threads -->
  <g stroke="#86CFBE" stroke-width="3.2" stroke-linecap="round">
    <line x1="15" y1="19" x2="15" y2="45"/>
    <line x1="26" y1="19" x2="26" y2="45"/>
    <line x1="37" y1="19" x2="37" y2="45"/>
  </g>
  <!-- horizontal weft threads (over) -->
  <g stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round">
    <line x1="13" y1="27" x2="39" y2="27"/>
    <line x1="13" y1="37" x2="39" y2="37"/>
  </g>
  <!-- Wordmark -->
  <text x="64" y="31" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#1B2A33" letter-spacing="0.5">ISAR</text>
  <text x="65" y="48" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="600" fill="#0F6E5C" letter-spacing="3.4">TEXTILE CO.</text>
</svg>
